name: Package macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # electron-builder and the app read version from package.json; the tag alone is not enough.
      - name: Sync package version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm pkg set "version=${GITHUB_REF_NAME#v}"

      - name: Build release artifacts
        run: |
          npm run build
          npx electron-builder --mac --publish never

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: skillava-macos-${{ github.ref_name }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/*.dmg \
            release/*.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
